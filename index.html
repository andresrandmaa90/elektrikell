<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpotPrice — Cheapest Electricity Hours</title>
  <meta name="description" content="Check the cheapest electricity hours from Nord Pool and get notified when prices are low." />
  <meta name="theme-color" content="#0a0f1e" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:       #080d1c;
      --surface:  #0f1729;
      --card:     #141e35;
      --border:   #1e2d4a;
      --accent:   #00e5ff;
      --accent2:  #7c3aed;
      --cheap:    #22c55e;
      --mid:      #f59e0b;
      --pricey:   #ef4444;
      --text:     #e2e8f0;
      --muted:    #64748b;
      --radius:   14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100dvh;
      overflow-x: hidden;
    }

    /* ── Ambient glow ── */
    body::before {
      content: '';
      position: fixed;
      top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 700px; height: 400px;
      background: radial-gradient(ellipse, rgba(0,229,255,.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px 16px 60px;
      position: relative;
      z-index: 1;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 0 32px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-mark {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    .logo-text {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .logo-text span { color: var(--accent); }

    /* ── Area Selector ── */
    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    select, .btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 10px;
      padding: 8px 14px;
      font-family: inherit;
      font-size: .875rem;
      cursor: pointer;
      outline: none;
      transition: border-color .2s, background .2s;
    }

    select:hover, select:focus { border-color: var(--accent); }

    .btn {
      background: rgba(0,229,255,.1);
      border-color: rgba(0,229,255,.3);
      color: var(--accent);
      font-weight: 600;
      display: flex; align-items: center; gap: 6px;
      transition: background .2s, border-color .2s;
    }

    .btn:hover {
      background: rgba(0,229,255,.18);
      border-color: var(--accent);
    }

    .btn:disabled {
      opacity: .4;
      cursor: not-allowed;
    }

    .btn.active {
      background: rgba(0,229,255,.22);
      border-color: var(--accent);
    }

    /* ── Status bar ── */
    .status-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 18px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: .85rem;
      color: var(--muted);
      min-height: 52px;
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      transition: background .3s;
    }

    .status-dot.live { background: var(--cheap); box-shadow: 0 0 8px var(--cheap); }
    .status-dot.loading { background: var(--mid); animation: pulse 1s infinite; }
    .status-dot.error { background: var(--pricey); }

    @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:.3 } }

    /* ── Summary cards ── */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
    }

    .stat-card.cheap::before  { background: var(--cheap); }
    .stat-card.mid::before    { background: var(--mid); }
    .stat-card.pricey::before { background: var(--pricey); }
    .stat-card.current::before { background: linear-gradient(90deg, var(--accent), var(--accent2)); }

    .stat-label {
      font-size: .72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 6px;
    }

    .stat-value {
      font-family: 'Space Mono', monospace;
      font-size: 1.5rem;
      font-weight: 700;
      line-height: 1;
    }

    .stat-sub {
      font-size: .75rem;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ── Best times banner ── */
    .best-times {
      background: linear-gradient(135deg, rgba(34,197,94,.1), rgba(0,229,255,.08));
      border: 1px solid rgba(34,197,94,.25);
      border-radius: var(--radius);
      padding: 18px 20px;
      margin-bottom: 24px;
    }

    .best-times-title {
      font-size: .75rem;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--cheap);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .best-slots {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .slot-chip {
      background: rgba(34,197,94,.15);
      border: 1px solid rgba(34,197,94,.3);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: .85rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .slot-chip .chip-price {
      font-family: 'Space Mono', monospace;
      font-size: .78rem;
      color: var(--cheap);
    }

    /* ── Tab bar ── */
    .tab-bar {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 4px;
    }

    .tab {
      flex: 1;
      padding: 8px;
      text-align: center;
      font-size: .85rem;
      font-weight: 500;
      border-radius: 8px;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--muted);
      transition: all .2s;
    }

    .tab.active {
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--border);
    }

    /* ── Chart ── */
    .chart-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 16px 16px;
      margin-bottom: 24px;
      overflow: hidden;
    }

    .chart-canvas-wrap {
      overflow-x: auto;
      overflow-y: hidden;
    }

    canvas#priceChart {
      display: block;
    }

    /* ── Hour list ── */
    .hour-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 8px;
    }

    .hour-row {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: border-color .2s;
    }

    .hour-row.is-cheap { border-color: rgba(34,197,94,.4); background: rgba(34,197,94,.05); }
    .hour-row.is-mid   { border-color: rgba(245,158,11,.3); }
    .hour-row.is-current { border-color: var(--accent); background: rgba(0,229,255,.05); }

    .hour-badge {
      font-family: 'Space Mono', monospace;
      font-size: .8rem;
      font-weight: 700;
      background: var(--surface);
      border-radius: 6px;
      padding: 4px 8px;
      min-width: 60px;
      text-align: center;
      flex-shrink: 0;
    }

    .hour-bar-wrap {
      flex: 1;
      height: 6px;
      background: var(--surface);
      border-radius: 3px;
      overflow: hidden;
    }

    .hour-bar {
      height: 100%;
      border-radius: 3px;
      transition: width .5s ease;
    }

    .hour-price {
      font-family: 'Space Mono', monospace;
      font-size: .85rem;
      font-weight: 700;
      min-width: 72px;
      text-align: right;
      flex-shrink: 0;
    }

    .hour-tag {
      font-size: .65rem;
      padding: 2px 6px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: .06em;
      flex-shrink: 0;
    }

    .tag-cheap  { background: rgba(34,197,94,.2);  color: var(--cheap); }
    .tag-now    { background: rgba(0,229,255,.15); color: var(--accent); }

    /* ── Notification panel ── */
    .notif-panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 24px;
    }

    .notif-panel h3 {
      font-size: .95rem;
      font-weight: 600;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .notif-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    @media (max-width: 500px) { .notif-grid { grid-template-columns: 1fr; } }

    .notif-option {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      cursor: pointer;
      transition: border-color .2s, background .2s;
    }

    .notif-option:hover { border-color: var(--accent); }
    .notif-option.selected {
      border-color: var(--accent);
      background: rgba(0,229,255,.07);
    }

    .notif-option input[type="radio"] { display: none; }
    .notif-option-label { font-size: .875rem; font-weight: 500; }
    .notif-option-desc  { font-size: .75rem; color: var(--muted); margin-top: 3px; }

    .threshold-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .threshold-row label { font-size: .85rem; color: var(--muted); white-space: nowrap; }

    input[type="range"] {
      -webkit-appearance: none;
      flex: 1;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      box-shadow: 0 0 8px rgba(0,229,255,.4);
    }

    .threshold-val {
      font-family: 'Space Mono', monospace;
      font-size: .85rem;
      color: var(--accent);
      min-width: 70px;
      text-align: right;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      color: var(--muted);
      font-size: .75rem;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    footer a { color: var(--accent); text-decoration: none; }

    /* ── Loader overlay ── */
    .loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      color: var(--muted);
      gap: 14px;
    }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      background: rgba(239,68,68,.1);
      border: 1px solid rgba(239,68,68,.3);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
      color: #fca5a5;
    }

    .error-box h3 { margin-bottom: 6px; }
    .error-box p { font-size: .875rem; color: var(--muted); }

    @media (max-width: 600px) {
      .summary-grid { grid-template-columns: repeat(2, 1fr); }
      .hour-list { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-mark">⚡</div>
      <span class="logo-text">Spot<span>Price</span></span>
    </div>
    <div class="controls">
      <select id="areaSelect">
        <optgroup label="Baltics">
          <option value="EE" selected>Estonia (EE)</option>
          <option value="LV">Latvia (LV)</option>
          <option value="LT">Lithuania (LT)</option>
        </optgroup>
        <optgroup label="Nordics">
          <option value="FI">Finland (FI)</option>
          <option value="SE3">Sweden SE3</option>
          <option value="SE4">Sweden SE4</option>
          <option value="NO1">Norway NO1</option>
          <option value="DK1">Denmark DK1</option>
          <option value="DK2">Denmark DK2</option>
        </optgroup>
        <optgroup label="Central Europe">
          <option value="DE-LU">Germany (DE)</option>
          <option value="FR">France (FR)</option>
          <option value="NL">Netherlands (NL)</option>
          <option value="BE">Belgium (BE)</option>
          <option value="AT">Austria (AT)</option>
          <option value="PL">Poland (PL)</option>
        </optgroup>
      </select>
      <select id="currencySelect">
        <option value="EUR">EUR</option>
        <option value="NOK">NOK</option>
        <option value="SEK">SEK</option>
        <option value="DKK">DKK</option>
      </select>
      <button class="btn" id="refreshBtn" onclick="loadData()">
        <span id="refreshIcon">↻</span> Refresh
      </button>
    </div>
  </header>

  <!-- Status -->
  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Loading prices from Nord Pool…</span>
  </div>

  <!-- Main content -->
  <div id="mainContent">
    <div class="loader">
      <div class="spinner"></div>
      <span>Fetching electricity prices…</span>
    </div>
  </div>

  <!-- Notification panel -->
  <div class="notif-panel" id="notifPanel" style="display:none">
    <h3>🔔 Price Alerts</h3>

    <div class="notif-grid">
      <label class="notif-option selected" id="opt-top3">
        <input type="radio" name="alertMode" value="top3" checked>
        <div class="notif-option-label">🏆 3 Cheapest Hours</div>
        <div class="notif-option-desc">Alert at the start of each of the 3 cheapest hours today</div>
      </label>
      <label class="notif-option" id="opt-threshold">
        <input type="radio" name="alertMode" value="threshold">
        <div class="notif-option-label">📉 Below Threshold</div>
        <div class="notif-option-desc">Alert whenever price drops below your limit</div>
      </label>
    </div>

    <div class="threshold-row" id="thresholdRow" style="opacity:.35; pointer-events:none">
      <label>Price limit</label>
      <input type="range" id="thresholdRange" min="0" max="30" value="8" step="0.5"
             oninput="document.getElementById('thresholdDisplay').textContent = this.value + ' ct/kWh'">
      <span class="threshold-val" id="thresholdDisplay">8 ct/kWh</span>
    </div>

    <button class="btn" id="notifBtn" onclick="toggleNotifications()" style="width:100%; justify-content:center; padding:11px;">
      🔔 Enable Notifications
    </button>

    <div id="notifStatus" style="font-size:.78rem; color:var(--muted); text-align:center; margin-top:10px; min-height:18px;"></div>
  </div>

  <footer>
    Prices from <a href="https://www.nordpoolgroup.com" target="_blank">Nord Pool</a> —
    Day-Ahead spot prices in €/MWh. VAT &amp; distribution not included. &nbsp;·&nbsp;
    <a href="#" onclick="installPWA(); return false" id="installLink" style="display:none">Install App</a>
  </footer>
</div>

<script>
// ─── State ────────────────────────────────────────────────────
let priceData = [];
let tomorrowData = [];
let currentView = 'today';
let notifEnabled = false;
let scheduledAlerts = [];
let deferredInstall = null;
let chartInstance = null;

// ─── PWA Install ──────────────────────────────────────────────
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredInstall = e;
  document.getElementById('installLink').style.display = 'inline';
});

async function installPWA() {
  if (!deferredInstall) return;
  deferredInstall.prompt();
  const { outcome } = await deferredInstall.userChoice;
  if (outcome === 'accepted') deferredInstall = null;
}

// ─── Service Worker ───────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// ─── Helpers ──────────────────────────────────────────────────
function pad2(n) { return String(n).padStart(2, '0'); }

function formatPrice(eur_mwh, currency) {
  // Convert EUR/MWh → ct/kWh (divide by 10 for EUR, adjust for others)
  const rates = { EUR: 1, NOK: 11.5, SEK: 11.3, DKK: 7.46 };
  const rate = rates[currency] || 1;
  const ctPerKwh = (eur_mwh * rate) / 10;
  const sym = { EUR:'ct', NOK:'øre', SEK:'öre', DKK:'øre' }[currency] || 'ct';
  return { val: ctPerKwh, display: ctPerKwh.toFixed(1) + ' ' + sym + '/kWh' };
}

function priceColor(val, min, max) {
  const pct = (val - min) / (max - min || 1);
  if (pct < 0.33) return 'var(--cheap)';
  if (pct < 0.66) return 'var(--mid)';
  return 'var(--pricey)';
}

function priceClass(val, min, max) {
  const pct = (val - min) / (max - min || 1);
  if (pct < 0.33) return 'is-cheap';
  if (pct < 0.66) return 'is-mid';
  return '';
}

function getLocalHour() {
  return new Date().getHours();
}

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
}

function tomorrowStr() {
  const d = new Date();
  d.setDate(d.getDate() + 1);
  return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
}

// ─── Nord Pool API ─────────────────────────────────────────────
async function fetchPrices(dateStr) {
  const area     = document.getElementById('areaSelect').value;
  const currency = document.getElementById('currencySelect').value;

  // Try via a CORS proxy since Nord Pool doesn't send CORS headers for browsers
  const apiUrl = `https://dataportal-api.nordpoolgroup.com/api/DayAheadPrices?date=${dateStr}&market=DayAhead&deliveryArea=${area}&currency=EUR`;
  const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(apiUrl)}`;

  const res = await fetch(proxyUrl, {
    headers: { 'Accept': 'application/json' }
  });

  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const json = await res.json();

  // Parse the multiAreaEntries → hourly prices for selected area
  if (!json.multiAreaEntries || !json.multiAreaEntries.length) {
    throw new Error('No price data in response');
  }

  const entries = json.multiAreaEntries;
  const parsed = entries.map((entry, idx) => {
    const deliveryStart = new Date(entry.deliveryStart);
    const hour = deliveryStart.getHours();
    const rawPrice = entry.entryPerArea?.[area] ?? null;
    return { hour, price: rawPrice, deliveryStart };
  }).filter(e => e.price !== null);

  // Sort by hour
  parsed.sort((a, b) => a.hour - b.hour);
  return parsed;
}

// ─── Load & Render ─────────────────────────────────────────────
async function loadData() {
  setStatus('loading', 'Fetching prices from Nord Pool…');
  document.getElementById('refreshIcon').style.animation = 'spin .7s linear infinite';
  document.getElementById('refreshBtn').disabled = true;

  try {
    const [today, tomorrow] = await Promise.allSettled([
      fetchPrices(todayStr()),
      fetchPrices(tomorrowStr())
    ]);

    if (today.status === 'fulfilled') {
      priceData = today.value;
    } else {
      throw today.reason;
    }

    tomorrowData = tomorrow.status === 'fulfilled' ? tomorrow.value : [];

    renderAll();
    setStatus('live', `Last updated ${new Date().toLocaleTimeString()} · ${priceData.length} price slots loaded`);
    document.getElementById('notifPanel').style.display = 'block';

    // Reschedule alerts if enabled
    if (notifEnabled) scheduleAlerts();

  } catch (err) {
    console.error(err);
    setStatus('error', 'Failed to load prices. Nord Pool may be unavailable.');
    document.getElementById('mainContent').innerHTML = `
      <div class="error-box">
        <h3>⚠️ Could not load prices</h3>
        <p>Nord Pool API or network unavailable. Try again in a few minutes.</p>
        <p style="margin-top:8px;font-size:.75rem;color:var(--muted)">${err.message}</p>
      </div>`;
  } finally {
    document.getElementById('refreshIcon').style.animation = '';
    document.getElementById('refreshBtn').disabled = false;
  }
}

function renderAll() {
  const data = currentView === 'today' ? priceData : tomorrowData;
  if (!data.length) {
    document.getElementById('mainContent').innerHTML = `
      <div class="error-box">
        <h3>No Data</h3>
        <p>Tomorrow's prices haven't been published yet (usually available after 13:00 CET).</p>
      </div>`;
    return;
  }

  const currency = document.getElementById('currencySelect').value;
  const prices = data.map(d => formatPrice(d.price, currency).val);
  const minP = Math.min(...prices);
  const maxP = Math.max(...prices);
  const avgP = prices.reduce((a,b) => a+b, 0) / prices.length;
  const curHour = currentView === 'today' ? getLocalHour() : -1;

  // Cheapest 3 slots
  const sorted = [...data].sort((a,b) => a.price - b.price);
  const cheapSlots = sorted.slice(0, 3);

  const sym = { EUR:'ct', NOK:'øre', SEK:'öre', DKK:'øre' }[currency] || 'ct';

  // ── Build HTML ──
  const html = `
    <div class="summary-grid">
      <div class="stat-card current">
        <div class="stat-label">Now (${pad2(curHour)}:00)</div>
        <div class="stat-value" style="color:var(--accent)">
          ${curHour >= 0 && priceData[curHour]
            ? formatPrice(priceData[curHour].price, currency).display
            : '—'}
        </div>
        <div class="stat-sub">Current hour</div>
      </div>
      <div class="stat-card cheap">
        <div class="stat-label">Cheapest</div>
        <div class="stat-value" style="color:var(--cheap)">${minP.toFixed(1)} ${sym}/kWh</div>
        <div class="stat-sub">${pad2(sorted[0].hour)}:00–${pad2(sorted[0].hour+1)}:00</div>
      </div>
      <div class="stat-card pricey">
        <div class="stat-label">Most Expensive</div>
        <div class="stat-value" style="color:var(--pricey)">${maxP.toFixed(1)} ${sym}/kWh</div>
        <div class="stat-sub">${pad2(sorted[sorted.length-1].hour)}:00</div>
      </div>
      <div class="stat-card mid">
        <div class="stat-label">Daily Average</div>
        <div class="stat-value" style="color:var(--mid)">${avgP.toFixed(1)} ${sym}/kWh</div>
        <div class="stat-sub">All hours</div>
      </div>
    </div>

    <div class="best-times">
      <div class="best-times-title">
        ✅ Best times to use electricity ${currentView === 'tomorrow' ? 'tomorrow' : 'today'}
      </div>
      <div class="best-slots">
        ${cheapSlots.map((slot, i) => {
          const p = formatPrice(slot.price, currency);
          const medals = ['🥇','🥈','🥉'];
          return `<div class="slot-chip">
            ${medals[i]} ${pad2(slot.hour)}:00–${pad2(slot.hour+1)}:00
            <span class="chip-price">${p.display}</span>
          </div>`;
        }).join('')}
      </div>
    </div>

    <!-- Tabs -->
    <div class="tab-bar">
      <button class="tab ${currentView==='today'?'active':''}" onclick="switchView('today')">Today</button>
      <button class="tab ${currentView==='tomorrow'?'active':''}" onclick="switchView('tomorrow')">
        Tomorrow ${tomorrowData.length ? '✓' : '(TBA)'}
      </button>
      <button class="tab" onclick="switchView('chart')">📊 Chart</button>
    </div>

    <!-- Chart container (hidden unless chart tab) -->
    <div class="chart-wrap" id="chartWrap" style="display:${currentView==='chart'?'block':'none'}">
      <div class="chart-canvas-wrap">
        <canvas id="priceChart" height="220"></canvas>
      </div>
    </div>

    <!-- Hour list -->
    <div class="hour-list" id="hourList" style="display:${currentView==='chart'?'none':'grid'}">
      ${data.map(slot => {
        const p = formatPrice(slot.price, currency);
        const barPct = ((p.val - minP) / (maxP - minP || 1) * 100).toFixed(1);
        const isCheap = cheapSlots.some(c => c.hour === slot.hour);
        const isNow = slot.hour === curHour;
        const cls = isNow ? 'is-current' : isCheap ? 'is-cheap' : priceClass(p.val, minP, maxP);
        const barColor = priceColor(p.val, minP, maxP);
        return `
          <div class="hour-row ${cls}">
            <span class="hour-badge">${pad2(slot.hour)}:00</span>
            <div class="hour-bar-wrap">
              <div class="hour-bar" style="width:${barPct}%; background:${barColor}"></div>
            </div>
            <span class="hour-price" style="color:${barColor}">${p.display}</span>
            ${isNow ? '<span class="hour-tag tag-now">Now</span>' : ''}
            ${isCheap && !isNow ? '<span class="hour-tag tag-cheap">Cheap</span>' : ''}
          </div>`;
      }).join('')}
    </div>
  `;

  document.getElementById('mainContent').innerHTML = html;

  if (currentView === 'chart') {
    setTimeout(() => renderChart(data, currency, minP, maxP, curHour), 50);
  }
}

function switchView(view) {
  currentView = view;
  renderAll();
}

// ─── Chart ─────────────────────────────────────────────────────
function renderChart(data, currency, minP, maxP, curHour) {
  const canvas = document.getElementById('priceChart');
  if (!canvas) return;

  const wrap = canvas.parentElement;
  const totalWidth = Math.max(wrap.clientWidth, data.length * 32);
  canvas.width  = totalWidth;
  canvas.height = 220;

  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const padL = 52, padR = 16, padT = 20, padB = 36;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;
  const n = data.length;

  ctx.clearRect(0, 0, W, H);

  // Grid lines
  ctx.strokeStyle = '#1e2d4a';
  ctx.lineWidth = 1;
  [0, 0.25, 0.5, 0.75, 1].forEach(t => {
    const y = padT + (1 - t) * chartH;
    ctx.beginPath();
    ctx.moveTo(padL, y);
    ctx.lineTo(W - padR, y);
    ctx.stroke();
    const val = minP + t * (maxP - minP);
    ctx.fillStyle = '#64748b';
    ctx.font = '10px Space Mono, monospace';
    ctx.textAlign = 'right';
    ctx.fillText(val.toFixed(1), padL - 6, y + 4);
  });

  const barW = chartW / n * 0.65;

  data.forEach((slot, i) => {
    const p = formatPrice(slot.price, currency).val;
    const barH = ((p - minP) / (maxP - minP || 1)) * chartH;
    const x = padL + (i + 0.5) * (chartW / n) - barW / 2;
    const y = padT + chartH - barH;

    // Highlight current hour
    if (slot.hour === curHour) {
      ctx.fillStyle = 'rgba(0,229,255,0.08)';
      ctx.fillRect(padL + i * (chartW/n), padT, chartW/n, chartH);
    }

    const color = priceColorHex(p, minP, maxP);
    ctx.fillStyle = color;

    // Rounded top bar
    const r = Math.min(4, barH / 2);
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + barW - r, y);
    ctx.quadraticCurveTo(x + barW, y, x + barW, y + r);
    ctx.lineTo(x + barW, padT + chartH);
    ctx.lineTo(x, padT + chartH);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
    ctx.fill();

    // Hour label
    if (n <= 24 || i % 2 === 0) {
      ctx.fillStyle = '#64748b';
      ctx.font = '10px Space Grotesk, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(pad2(slot.hour), padL + (i + 0.5) * (chartW / n), H - 10);
    }
  });

  // Average line
  const avgP = data.reduce((s, d) => s + formatPrice(d.price, currency).val, 0) / n;
  const avgY = padT + (1 - (avgP - minP) / (maxP - minP || 1)) * chartH;
  ctx.strokeStyle = 'rgba(245,158,11,0.5)';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.moveTo(padL, avgY);
  ctx.lineTo(W - padR, avgY);
  ctx.stroke();
  ctx.setLineDash([]);
}

function priceColorHex(val, min, max) {
  const pct = (val - min) / (max - min || 1);
  if (pct < 0.33) return '#22c55e';
  if (pct < 0.66) return '#f59e0b';
  return '#ef4444';
}

// ─── Status bar ────────────────────────────────────────────────
function setStatus(state, msg) {
  const dot  = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  dot.className = 'status-dot ' + state;
  text.textContent = msg;
}

// ─── Notifications ─────────────────────────────────────────────
function getAlertMode() {
  return document.querySelector('input[name="alertMode"]:checked')?.value || 'top3';
}

document.addEventListener('change', e => {
  if (e.target.name === 'alertMode') {
    document.querySelectorAll('.notif-option').forEach(el => el.classList.remove('selected'));
    e.target.closest('.notif-option').classList.add('selected');
    const isThresh = e.target.value === 'threshold';
    document.getElementById('thresholdRow').style.opacity = isThresh ? '1' : '.35';
    document.getElementById('thresholdRow').style.pointerEvents = isThresh ? 'auto' : 'none';
  }
});

async function toggleNotifications() {
  if (notifEnabled) {
    disableNotifications();
    return;
  }

  if (!('Notification' in window)) {
    setNotifStatus('❌ Your browser does not support notifications');
    return;
  }

  const perm = await Notification.requestPermission();
  if (perm !== 'granted') {
    setNotifStatus('❌ Notification permission denied — enable it in browser settings');
    return;
  }

  notifEnabled = true;
  document.getElementById('notifBtn').textContent = '🔕 Disable Notifications';
  document.getElementById('notifBtn').classList.add('active');

  scheduleAlerts();
  setNotifStatus('✅ Notifications enabled — you\'ll be alerted at the cheapest hours');
}

function disableNotifications() {
  notifEnabled = false;
  scheduledAlerts.forEach(t => clearTimeout(t));
  scheduledAlerts = [];
  document.getElementById('notifBtn').textContent = '🔔 Enable Notifications';
  document.getElementById('notifBtn').classList.remove('active');
  setNotifStatus('Notifications disabled');
}

function setNotifStatus(msg) {
  document.getElementById('notifStatus').textContent = msg;
}

function scheduleAlerts() {
  scheduledAlerts.forEach(t => clearTimeout(t));
  scheduledAlerts = [];

  const currency = document.getElementById('currencySelect').value;
  const mode = getAlertMode();
  const now = new Date();

  let slotsToAlert = [];

  if (mode === 'top3') {
    const sorted = [...priceData].sort((a,b) => a.price - b.price).slice(0, 3);
    slotsToAlert = sorted;
  } else {
    const threshold = parseFloat(document.getElementById('thresholdRange').value);
    slotsToAlert = priceData.filter(slot => {
      const p = formatPrice(slot.price, currency).val;
      return p <= threshold;
    });
  }

  let count = 0;
  slotsToAlert.forEach(slot => {
    const alertTime = new Date();
    alertTime.setHours(slot.hour, 0, 0, 0);
    const delay = alertTime - now;
    if (delay < 0) return; // past

    const t = setTimeout(() => {
      const p = formatPrice(slot.price, currency);
      sendNotification(
        '⚡ Cheap electricity now!',
        `${pad2(slot.hour)}:00–${pad2(slot.hour+1)}:00 is only ${p.display}. Good time to run appliances!`,
        slot.hour
      );
    }, delay);
    scheduledAlerts.push(t);
    count++;
  });

  if (count > 0) {
    setNotifStatus(`✅ ${count} alert${count>1?'s':''} scheduled for today`);
  } else {
    setNotifStatus('ℹ️ No upcoming cheap slots found for today');
  }

  // Also send an immediate "best times today" summary notification
  new Notification('⚡ SpotPrice — Today\'s best hours', {
    body: getBestTimesText(),
    icon: 'icons/icon-192.png',
    badge: 'icons/icon-192.png',
    tag: 'spotprice-summary'
  });
}

function getBestTimesText() {
  const currency = document.getElementById('currencySelect').value;
  const sorted = [...priceData].sort((a,b) => a.price - b.price).slice(0, 3);
  return sorted.map(s => {
    const p = formatPrice(s.price, currency);
    return `${pad2(s.hour)}:00 → ${p.display}`;
  }).join('  ·  ');
}

function sendNotification(title, body, hour) {
  if (!notifEnabled || Notification.permission !== 'granted') return;
  new Notification(title, {
    body,
    icon: 'icons/icon-192.png',
    badge: 'icons/icon-192.png',
    tag: `spotprice-hour-${hour}`,
    requireInteraction: false
  });
}

// ─── Area/currency change ──────────────────────────────────────
document.getElementById('areaSelect').addEventListener('change', loadData);
document.getElementById('currencySelect').addEventListener('change', () => {
  if (priceData.length) renderAll();
});

// ─── Init ──────────────────────────────────────────────────────
loadData();

// Auto-refresh every 30 minutes
setInterval(loadData, 30 * 60 * 1000);
</script>
